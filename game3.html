<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asteroid Blaster</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }

    .game-container {
      position: relative;
    }

    canvas {
      display: block;
      border: 3px solid #0ff;
      box-shadow: 
        0 0 20px #0ff,
        0 0 40px #0ff,
        inset 0 0 60px rgba(0, 255, 255, 0.1);
    }

    .ui {
      position: absolute;
      top: 15px;
      left: 20px;
      right: 20px;
      display: flex;
      justify-content: space-between;
      color: #0ff;
      font-size: 18px;
      text-shadow: 0 0 10px #0ff;
      pointer-events: none;
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #0ff;
      text-align: center;
    }

    .overlay.hidden {
      display: none;
    }

    .overlay h1 {
      font-size: 48px;
      margin-bottom: 10px;
      text-shadow: 0 0 20px #0ff, 0 0 40px #0ff;
      letter-spacing: 4px;
    }

    .overlay h2 {
      font-size: 32px;
      margin-bottom: 20px;
      color: #f0f;
      text-shadow: 0 0 15px #f0f;
    }

    .overlay p {
      font-size: 16px;
      margin: 8px 0;
      opacity: 0.8;
    }

    .overlay .score-display {
      font-size: 24px;
      margin: 20px 0;
      color: #ff0;
      text-shadow: 0 0 10px #ff0;
    }

    .start-btn {
      margin-top: 30px;
      padding: 15px 50px;
      font-size: 20px;
      font-family: 'Courier New', monospace;
      background: transparent;
      color: #0ff;
      border: 2px solid #0ff;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 3px;
      transition: all 0.3s;
    }

    .start-btn:hover {
      background: #0ff;
      color: #000;
      box-shadow: 0 0 30px #0ff;
    }

    .controls-info {
      margin-top: 40px;
      padding: 20px;
      border: 1px solid rgba(0, 255, 255, 0.3);
    }

    .controls-info h3 {
      margin-bottom: 15px;
      font-size: 14px;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div class="game-container">
    <canvas id="game" width="800" height="600"></canvas>
    
    <div class="ui">
      <div id="score">SCORE: 0</div>
      <div id="lives">LIVES: ♦♦♦</div>
    </div>

    <div class="overlay" id="startScreen">
      <h1>ASTEROID BLASTER</h1>
      <div class="controls-info">
        <h3>— CONTROLS —</h3>
        <p>↑ or W — Thrust</p>
        <p>← → or A D — Rotate</p>
        <p>SPACE — Fire</p>
      </div>
      <button class="start-btn" id="startBtn">START GAME</button>
    </div>

    <div class="overlay hidden" id="gameOverScreen">
      <h2>GAME OVER</h2>
      <div class="score-display" id="finalScore">SCORE: 0</div>
      <button class="start-btn" id="restartBtn">PLAY AGAIN</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const W = canvas.width;
    const H = canvas.height;

    // Game state
    let ship, bullets, asteroids, particles;
    let score, lives, gameRunning, gameOver;
    let keys = {};

    // Ship class
    class Ship {
      constructor() {
        this.x = W / 2;
        this.y = H / 2;
        this.angle = -Math.PI / 2;
        this.vx = 0;
        this.vy = 0;
        this.radius = 15;
        this.thrust = 0.15;
        this.friction = 0.99;
        this.rotSpeed = 0.07;
        this.invincible = 0;
        this.visible = true;
      }

      update() {
        if (keys['ArrowLeft'] || keys['KeyA']) this.angle -= this.rotSpeed;
        if (keys['ArrowRight'] || keys['KeyD']) this.angle += this.rotSpeed;
        
        if (keys['ArrowUp'] || keys['KeyW']) {
          this.vx += Math.cos(this.angle) * this.thrust;
          this.vy += Math.sin(this.angle) * this.thrust;
          // Thrust particles
          if (Math.random() > 0.5) {
            particles.push(new Particle(
              this.x - Math.cos(this.angle) * 20,
              this.y - Math.sin(this.angle) * 20,
              this.vx * -0.5 + (Math.random() - 0.5),
              this.vy * -0.5 + (Math.random() - 0.5),
              '#f80', 15
            ));
          }
        }

        this.vx *= this.friction;
        this.vy *= this.friction;
        this.x += this.vx;
        this.y += this.vy;

        // Screen wrap
        if (this.x < 0) this.x = W;
        if (this.x > W) this.x = 0;
        if (this.y < 0) this.y = H;
        if (this.y > H) this.y = 0;

        if (this.invincible > 0) {
          this.invincible--;
          this.visible = Math.floor(this.invincible / 5) % 2 === 0;
        } else {
          this.visible = true;
        }
      }

      draw() {
        if (!this.visible) return;
        
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);
        
        ctx.strokeStyle = '#0ff';
        ctx.lineWidth = 2;
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#0ff';
        
        ctx.beginPath();
        ctx.moveTo(20, 0);
        ctx.lineTo(-15, -12);
        ctx.lineTo(-10, 0);
        ctx.lineTo(-15, 12);
        ctx.closePath();
        ctx.stroke();
        
        ctx.restore();
      }

      shoot() {
        bullets.push(new Bullet(
          this.x + Math.cos(this.angle) * 20,
          this.y + Math.sin(this.angle) * 20,
          Math.cos(this.angle) * 8 + this.vx,
          Math.sin(this.angle) * 8 + this.vy
        ));
      }
    }

    // Bullet class
    class Bullet {
      constructor(x, y, vx, vy) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.radius = 3;
        this.life = 60;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life--;

        if (this.x < 0) this.x = W;
        if (this.x > W) this.x = 0;
        if (this.y < 0) this.y = H;
        if (this.y > H) this.y = 0;
      }

      draw() {
        ctx.fillStyle = '#ff0';
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#ff0';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Asteroid class
    class Asteroid {
      constructor(x, y, size) {
        this.x = x;
        this.y = y;
        this.size = size; // 3 = large, 2 = medium, 1 = small
        this.radius = size * 15 + 10;
        
        const speed = (4 - size) * 0.8 + Math.random();
        const angle = Math.random() * Math.PI * 2;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.rotation = 0;
        this.rotSpeed = (Math.random() - 0.5) * 0.04;
        
        // Generate jagged shape
        this.vertices = [];
        const numVerts = 8 + Math.floor(Math.random() * 5);
        for (let i = 0; i < numVerts; i++) {
          const a = (i / numVerts) * Math.PI * 2;
          const r = this.radius * (0.7 + Math.random() * 0.3);
          this.vertices.push({ x: Math.cos(a) * r, y: Math.sin(a) * r });
        }
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.rotation += this.rotSpeed;

        if (this.x < -this.radius) this.x = W + this.radius;
        if (this.x > W + this.radius) this.x = -this.radius;
        if (this.y < -this.radius) this.y = H + this.radius;
        if (this.y > H + this.radius) this.y = -this.radius;
      }

      draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);
        
        ctx.strokeStyle = '#888';
        ctx.lineWidth = 2;
        ctx.shadowBlur = 5;
        ctx.shadowColor = '#888';
        
        ctx.beginPath();
        ctx.moveTo(this.vertices[0].x, this.vertices[0].y);
        for (let i = 1; i < this.vertices.length; i++) {
          ctx.lineTo(this.vertices[i].x, this.vertices[i].y);
        }
        ctx.closePath();
        ctx.stroke();
        
        ctx.restore();
      }

      break() {
        const points = [20, 50, 100][3 - this.size];
        score += points;
        
        // Explosion particles
        for (let i = 0; i < this.size * 8; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = Math.random() * 3 + 1;
          particles.push(new Particle(
            this.x, this.y,
            Math.cos(angle) * speed + this.vx,
            Math.sin(angle) * speed + this.vy,
            '#fff', 30
          ));
        }

        // Spawn smaller asteroids
        if (this.size > 1) {
          const newSize = this.size - 1;
          const numNew = 2 + Math.floor(Math.random() * 2);
          const spawned = [];
          for (let i = 0; i < numNew; i++) {
            spawned.push(new Asteroid(this.x, this.y, newSize));
          }
          return spawned;
        }
        return [];
      }
    }

    // Particle class
    class Particle {
      constructor(x, y, vx, vy, color, life) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.color = color;
        this.life = life;
        this.maxLife = life;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vx *= 0.98;
        this.vy *= 0.98;
        this.life--;
      }

      draw() {
        const alpha = this.life / this.maxLife;
        ctx.fillStyle = this.color;
        ctx.globalAlpha = alpha;
        ctx.beginPath();
        ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }

    // Spawn asteroids
    function spawnAsteroids(count) {
      for (let i = 0; i < count; i++) {
        let x, y;
        do {
          x = Math.random() * W;
          y = Math.random() * H;
        } while (Math.hypot(x - ship.x, y - ship.y) < 150);
        
        asteroids.push(new Asteroid(x, y, 3));
      }
    }

    // Check collision
    function circleCollision(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y) < a.radius + b.radius;
    }

    // Ship hit
    function shipHit() {
      lives--;
      updateUI();
      
      // Death particles
      for (let i = 0; i < 30; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 4 + 2;
        particles.push(new Particle(
          ship.x, ship.y,
          Math.cos(angle) * speed,
          Math.sin(angle) * speed,
          '#0ff', 50
        ));
      }

      if (lives <= 0) {
        endGame();
      } else {
        ship.x = W / 2;
        ship.y = H / 2;
        ship.vx = 0;
        ship.vy = 0;
        ship.invincible = 120;
      }
    }

    // Update UI
    function updateUI() {
      document.getElementById('score').textContent = `SCORE: ${score}`;
      document.getElementById('lives').textContent = `LIVES: ${'♦'.repeat(lives)}`;
    }

    // Game loop
    function gameLoop() {
      if (!gameRunning) return;

      // Clear
      ctx.fillStyle = '#0a0a0a';
      ctx.fillRect(0, 0, W, H);

      // Draw stars (static background)
      ctx.fillStyle = '#333';
      for (let i = 0; i < 100; i++) {
        const sx = (i * 137.5) % W;
        const sy = (i * 97.3) % H;
        ctx.fillRect(sx, sy, 1, 1);
      }

      // Update & draw ship
      ship.update();
      ship.draw();

      // Update & draw bullets
      bullets = bullets.filter(b => b.life > 0);
      bullets.forEach(b => { b.update(); b.draw(); });

      // Update & draw asteroids
      asteroids.forEach(a => { a.update(); a.draw(); });

      // Update & draw particles
      particles = particles.filter(p => p.life > 0);
      particles.forEach(p => { p.update(); p.draw(); });

      // Bullet-asteroid collision
      for (let i = bullets.length - 1; i >= 0; i--) {
        for (let j = asteroids.length - 1; j >= 0; j--) {
          if (circleCollision(bullets[i], asteroids[j])) {
            const newAsteroids = asteroids[j].break();
            asteroids.splice(j, 1);
            bullets.splice(i, 1);
            asteroids.push(...newAsteroids);
            updateUI();
            break;
          }
        }
      }

      // Ship-asteroid collision
      if (ship.invincible <= 0) {
        for (const a of asteroids) {
          if (circleCollision(ship, a)) {
            shipHit();
            break;
          }
        }
      }

      // Spawn more asteroids if cleared
      if (asteroids.length === 0) {
        spawnAsteroids(5 + Math.floor(score / 500));
      }

      requestAnimationFrame(gameLoop);
    }

    // Start game
    function startGame() {
      ship = new Ship();
      bullets = [];
      asteroids = [];
      particles = [];
      score = 0;
      lives = 3;
      gameRunning = true;
      gameOver = false;

      updateUI();
      spawnAsteroids(4);

      document.getElementById('startScreen').classList.add('hidden');
      document.getElementById('gameOverScreen').classList.add('hidden');

      gameLoop();
    }

    // End game
    function endGame() {
      gameRunning = false;
      gameOver = true;
      document.getElementById('finalScore').textContent = `SCORE: ${score}`;
      document.getElementById('gameOverScreen').classList.remove('hidden');
    }

    // Input handlers
    document.addEventListener('keydown', e => {
      keys[e.code] = true;
      if (e.code === 'Space' && gameRunning && !gameOver) {
        ship.shoot();
        e.preventDefault();
      }
    });

    document.addEventListener('keyup', e => {
      keys[e.code] = false;
    });

    document.getElementById('startBtn').addEventListener('click', startGame);
    document.getElementById('restartBtn').addEventListener('click', startGame);
  </script>
</body>
</html>
