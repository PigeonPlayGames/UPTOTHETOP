<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Asteroid Blaster</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      touch-action: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background: #0a0a0a;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Courier New', monospace;
    }

    .game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      max-width: 100%;
      max-height: 100%;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      border: none;
      box-shadow: inset 0 0 60px rgba(0, 255, 255, 0.1);
    }

    .ui {
      position: absolute;
      top: 10px;
      left: 15px;
      right: 15px;
      display: flex;
      justify-content: space-between;
      color: #0ff;
      font-size: clamp(14px, 3vw, 18px);
      text-shadow: 0 0 10px #0ff;
      pointer-events: none;
      z-index: 10;
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #0ff;
      text-align: center;
      padding: 20px;
      z-index: 20;
    }

    .overlay.hidden {
      display: none;
    }

    .overlay h1 {
      font-size: clamp(28px, 8vw, 48px);
      margin-bottom: 10px;
      text-shadow: 0 0 20px #0ff, 0 0 40px #0ff;
      letter-spacing: 2px;
    }

    .overlay h2 {
      font-size: clamp(24px, 6vw, 32px);
      margin-bottom: 20px;
      color: #f0f;
      text-shadow: 0 0 15px #f0f;
    }

    .overlay p {
      font-size: clamp(12px, 2.5vw, 16px);
      margin: 6px 0;
      opacity: 0.8;
    }

    .overlay .score-display {
      font-size: clamp(18px, 5vw, 24px);
      margin: 20px 0;
      color: #ff0;
      text-shadow: 0 0 10px #ff0;
    }

    .start-btn {
      margin-top: 25px;
      padding: 12px 40px;
      font-size: clamp(16px, 4vw, 20px);
      font-family: 'Courier New', monospace;
      background: transparent;
      color: #0ff;
      border: 2px solid #0ff;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: all 0.3s;
    }

    .start-btn:hover, .start-btn:active {
      background: #0ff;
      color: #000;
      box-shadow: 0 0 30px #0ff;
    }

    .controls-info {
      margin-top: 30px;
      padding: 15px;
      border: 1px solid rgba(0, 255, 255, 0.3);
      max-width: 90%;
    }

    .controls-info h3 {
      margin-bottom: 12px;
      font-size: clamp(12px, 2.5vw, 14px);
      letter-spacing: 2px;
    }

    .desktop-controls, .mobile-controls {
      display: none;
    }

    /* Touch controls overlay */
    .touch-controls {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      top: 0;
      pointer-events: none;
      z-index: 5;
      display: none;
    }

    .touch-controls.active {
      display: block;
    }

    .joystick-zone {
      position: absolute;
      left: 0;
      top: 0;
      width: 50%;
      height: 100%;
      pointer-events: auto;
    }

    .joystick-base {
      position: absolute;
      width: 120px;
      height: 120px;
      border: 3px solid rgba(0, 255, 255, 0.4);
      border-radius: 50%;
      background: rgba(0, 255, 255, 0.1);
      display: none;
      transform: translate(-50%, -50%);
    }

    .joystick-stick {
      position: absolute;
      width: 50px;
      height: 50px;
      background: rgba(0, 255, 255, 0.6);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 20px #0ff;
    }

    .fire-zone {
      position: absolute;
      right: 0;
      top: 0;
      width: 50%;
      height: 100%;
      pointer-events: auto;
    }

    .fire-btn {
      position: absolute;
      right: 30px;
      bottom: 80px;
      width: 80px;
      height: 80px;
      border: 3px solid rgba(255, 255, 0, 0.6);
      border-radius: 50%;
      background: rgba(255, 255, 0, 0.2);
      display: flex;
      justify-content: center;
      align-items: center;
      color: #ff0;
      font-size: 12px;
      font-weight: bold;
      text-shadow: 0 0 10px #ff0;
      pointer-events: auto;
    }

    .fire-btn:active {
      background: rgba(255, 255, 0, 0.5);
      box-shadow: 0 0 30px #ff0;
    }

    .thrust-btn {
      position: absolute;
      right: 30px;
      bottom: 180px;
      width: 70px;
      height: 70px;
      border: 3px solid rgba(255, 136, 0, 0.6);
      border-radius: 50%;
      background: rgba(255, 136, 0, 0.2);
      display: flex;
      justify-content: center;
      align-items: center;
      color: #f80;
      font-size: 20px;
      text-shadow: 0 0 10px #f80;
      pointer-events: auto;
    }

    .thrust-btn:active {
      background: rgba(255, 136, 0, 0.5);
      box-shadow: 0 0 30px #f80;
    }

    /* Show appropriate controls based on device */
    @media (hover: hover) and (pointer: fine) {
      .desktop-controls { display: block; }
    }

    @media (hover: none) and (pointer: coarse) {
      .mobile-controls { display: block; }
    }

    /* Gamepad indicator */
    .gamepad-indicator {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      color: #0f0;
      font-size: 12px;
      text-shadow: 0 0 10px #0f0;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 10;
    }

    .gamepad-indicator.active {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="game-container">
    <canvas id="game"></canvas>
    
    <div class="ui">
      <div id="score">SCORE: 0</div>
      <div id="lives">LIVES: ♦♦♦</div>
    </div>

    <div class="gamepad-indicator" id="gamepadIndicator">🎮 GAMEPAD CONNECTED</div>

    <div class="touch-controls" id="touchControls">
      <div class="joystick-zone" id="joystickZone">
        <div class="joystick-base" id="joystickBase">
          <div class="joystick-stick" id="joystickStick"></div>
        </div>
      </div>
      <div class="fire-zone" id="fireZone">
        <div class="thrust-btn" id="thrustBtn">▲</div>
        <div class="fire-btn" id="fireBtn">FIRE</div>
      </div>
    </div>

    <div class="overlay" id="startScreen">
      <h1>ASTEROID BLASTER</h1>
      <div class="controls-info">
        <h3>— CONTROLS —</h3>
        <div class="desktop-controls">
          <p>↑ or W — Thrust</p>
          <p>← → or A D — Rotate</p>
          <p>SPACE — Fire</p>
        </div>
        <div class="mobile-controls">
          <p>Left side — Virtual joystick to rotate</p>
          <p>▲ Button — Thrust forward</p>
          <p>FIRE Button — Shoot</p>
        </div>
        <p style="margin-top: 10px; color: #0f0;">🎮 Gamepad supported!</p>
      </div>
      <button class="start-btn" id="startBtn">START GAME</button>
    </div>

    <div class="overlay hidden" id="gameOverScreen">
      <h2>GAME OVER</h2>
      <div class="score-display" id="finalScore">SCORE: 0</div>
      <button class="start-btn" id="restartBtn">PLAY AGAIN</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    
    // Responsive canvas sizing
    let W, H, scale;
    
    function resizeCanvas() {
      const container = canvas.parentElement;
      W = container.clientWidth;
      H = container.clientHeight;
      
      // Set actual canvas resolution
      const dpr = window.devicePixelRatio || 1;
      canvas.width = W * dpr;
      canvas.height = H * dpr;
      ctx.scale(dpr, dpr);
      
      scale = Math.min(W / 800, H / 600);
    }
    
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // Detect touch device
    const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
    
    if (isTouchDevice) {
      document.getElementById('touchControls').classList.add('active');
    }

    // Game state
    let ship, bullets, asteroids, particles;
    let score, lives, gameRunning, gameOver;
    let keys = {};

    // Touch/Joystick state
    let joystickActive = false;
    let joystickStart = { x: 0, y: 0 };
    let joystickCurrent = { x: 0, y: 0 };
    let joystickTouchId = null;
    let thrustActive = false;
    let firePressed = false;
    let lastFireTime = 0;

    // Gamepad state
    let gamepadIndex = null;
    let gamepadFirePressed = false;

    // Ship class
    class Ship {
      constructor() {
        this.x = W / 2;
        this.y = H / 2;
        this.angle = -Math.PI / 2;
        this.vx = 0;
        this.vy = 0;
        this.radius = 15 * scale;
        this.thrust = 0.15 * scale;
        this.friction = 0.99;
        this.rotSpeed = 0.07;
        this.invincible = 0;
        this.visible = true;
      }

      update() {
        // Keyboard rotation
        if (keys['ArrowLeft'] || keys['KeyA']) this.angle -= this.rotSpeed;
        if (keys['ArrowRight'] || keys['KeyD']) this.angle += this.rotSpeed;
        
        // Joystick rotation
        if (joystickActive) {
          const dx = joystickCurrent.x - joystickStart.x;
          const dy = joystickCurrent.y - joystickStart.y;
          const dist = Math.hypot(dx, dy);
          
          if (dist > 10) {
            const targetAngle = Math.atan2(dy, dx);
            let angleDiff = targetAngle - this.angle;
            
            // Normalize angle difference
            while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
            while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
            
            const rotAmount = Math.min(Math.abs(angleDiff), this.rotSpeed * 1.5);
            this.angle += Math.sign(angleDiff) * rotAmount;
          }
        }
        
        // Keyboard/touch thrust
        const isThrusting = keys['ArrowUp'] || keys['KeyW'] || thrustActive;
        
        if (isThrusting) {
          this.vx += Math.cos(this.angle) * this.thrust;
          this.vy += Math.sin(this.angle) * this.thrust;
          
          // Thrust particles
          if (Math.random() > 0.5) {
            particles.push(new Particle(
              this.x - Math.cos(this.angle) * 20 * scale,
              this.y - Math.sin(this.angle) * 20 * scale,
              this.vx * -0.5 + (Math.random() - 0.5) * scale,
              this.vy * -0.5 + (Math.random() - 0.5) * scale,
              '#f80', 15
            ));
          }
        }

        this.vx *= this.friction;
        this.vy *= this.friction;
        this.x += this.vx;
        this.y += this.vy;

        // Screen wrap
        if (this.x < 0) this.x = W;
        if (this.x > W) this.x = 0;
        if (this.y < 0) this.y = H;
        if (this.y > H) this.y = 0;

        if (this.invincible > 0) {
          this.invincible--;
          this.visible = Math.floor(this.invincible / 5) % 2 === 0;
        } else {
          this.visible = true;
        }
      }

      draw() {
        if (!this.visible) return;
        
        const s = scale;
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);
        
        ctx.strokeStyle = '#0ff';
        ctx.lineWidth = 2;
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#0ff';
        
        ctx.beginPath();
        ctx.moveTo(20 * s, 0);
        ctx.lineTo(-15 * s, -12 * s);
        ctx.lineTo(-10 * s, 0);
        ctx.lineTo(-15 * s, 12 * s);
        ctx.closePath();
        ctx.stroke();
        
        ctx.restore();
      }

      shoot() {
        const s = scale;
        bullets.push(new Bullet(
          this.x + Math.cos(this.angle) * 20 * s,
          this.y + Math.sin(this.angle) * 20 * s,
          Math.cos(this.angle) * 8 * s + this.vx,
          Math.sin(this.angle) * 8 * s + this.vy
        ));
      }
    }

    // Bullet class
    class Bullet {
      constructor(x, y, vx, vy) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.radius = 3 * scale;
        this.life = 60;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life--;

        if (this.x < 0) this.x = W;
        if (this.x > W) this.x = 0;
        if (this.y < 0) this.y = H;
        if (this.y > H) this.y = 0;
      }

      draw() {
        ctx.fillStyle = '#ff0';
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#ff0';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Asteroid class
    class Asteroid {
      constructor(x, y, size) {
        this.x = x;
        this.y = y;
        this.size = size;
        this.radius = (size * 15 + 10) * scale;
        
        const speed = ((4 - size) * 0.8 + Math.random()) * scale;
        const angle = Math.random() * Math.PI * 2;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.rotation = 0;
        this.rotSpeed = (Math.random() - 0.5) * 0.04;
        
        this.vertices = [];
        const numVerts = 8 + Math.floor(Math.random() * 5);
        for (let i = 0; i < numVerts; i++) {
          const a = (i / numVerts) * Math.PI * 2;
          const r = this.radius * (0.7 + Math.random() * 0.3);
          this.vertices.push({ x: Math.cos(a) * r, y: Math.sin(a) * r });
        }
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.rotation += this.rotSpeed;

        if (this.x < -this.radius) this.x = W + this.radius;
        if (this.x > W + this.radius) this.x = -this.radius;
        if (this.y < -this.radius) this.y = H + this.radius;
        if (this.y > H + this.radius) this.y = -this.radius;
      }

      draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);
        
        ctx.strokeStyle = '#888';
        ctx.lineWidth = 2;
        ctx.shadowBlur = 5;
        ctx.shadowColor = '#888';
        
        ctx.beginPath();
        ctx.moveTo(this.vertices[0].x, this.vertices[0].y);
        for (let i = 1; i < this.vertices.length; i++) {
          ctx.lineTo(this.vertices[i].x, this.vertices[i].y);
        }
        ctx.closePath();
        ctx.stroke();
        
        ctx.restore();
      }

      break() {
        const points = [20, 50, 100][3 - this.size];
        score += points;
        
        for (let i = 0; i < this.size * 8; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = (Math.random() * 3 + 1) * scale;
          particles.push(new Particle(
            this.x, this.y,
            Math.cos(angle) * speed + this.vx,
            Math.sin(angle) * speed + this.vy,
            '#fff', 30
          ));
        }

        if (this.size > 1) {
          const newSize = this.size - 1;
          const numNew = 2 + Math.floor(Math.random() * 2);
          const spawned = [];
          for (let i = 0; i < numNew; i++) {
            spawned.push(new Asteroid(this.x, this.y, newSize));
          }
          return spawned;
        }
        return [];
      }
    }

    // Particle class
    class Particle {
      constructor(x, y, vx, vy, color, life) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.color = color;
        this.life = life;
        this.maxLife = life;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vx *= 0.98;
        this.vy *= 0.98;
        this.life--;
      }

      draw() {
        const alpha = this.life / this.maxLife;
        ctx.fillStyle = this.color;
        ctx.globalAlpha = alpha;
        ctx.beginPath();
        ctx.arc(this.x, this.y, 2 * scale, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }

    // Spawn asteroids
    function spawnAsteroids(count) {
      for (let i = 0; i < count; i++) {
        let x, y;
        do {
          x = Math.random() * W;
          y = Math.random() * H;
        } while (Math.hypot(x - ship.x, y - ship.y) < 150 * scale);
        
        asteroids.push(new Asteroid(x, y, 3));
      }
    }

    // Collision detection
    function circleCollision(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y) < a.radius + b.radius;
    }

    // Ship hit
    function shipHit() {
      lives--;
      updateUI();
      
      for (let i = 0; i < 30; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = (Math.random() * 4 + 2) * scale;
        particles.push(new Particle(
          ship.x, ship.y,
          Math.cos(angle) * speed,
          Math.sin(angle) * speed,
          '#0ff', 50
        ));
      }

      if (lives <= 0) {
        endGame();
      } else {
        ship.x = W / 2;
        ship.y = H / 2;
        ship.vx = 0;
        ship.vy = 0;
        ship.invincible = 120;
      }
    }

    // Update UI
    function updateUI() {
      document.getElementById('score').textContent = `SCORE: ${score}`;
      document.getElementById('lives').textContent = `LIVES: ${'♦'.repeat(Math.max(0, lives))}`;
    }

    // Gamepad handling
    function handleGamepad() {
      const gamepads = navigator.getGamepads();
      let gp = null;
      
      for (const pad of gamepads) {
        if (pad && pad.connected) {
          gp = pad;
          gamepadIndex = pad.index;
          break;
        }
      }
      
      if (!gp) {
        gamepadIndex = null;
        document.getElementById('gamepadIndicator').classList.remove('active');
        return;
      }
      
      document.getElementById('gamepadIndicator').classList.add('active');
      
      // Left stick for rotation
      const deadzone = 0.2;
      const lx = Math.abs(gp.axes[0]) > deadzone ? gp.axes[0] : 0;
      const ly = Math.abs(gp.axes[1]) > deadzone ? gp.axes[1] : 0;
      
      if (ship && gameRunning) {
        // Rotation from left stick horizontal
        if (lx !== 0) {
          ship.angle += lx * ship.rotSpeed * 1.2;
        }
        
        // D-pad rotation
        if (gp.buttons[14]?.pressed) ship.angle -= ship.rotSpeed; // Left
        if (gp.buttons[15]?.pressed) ship.angle += ship.rotSpeed; // Right
        
        // Thrust: left stick up, RT, or D-pad up
        if (ly < -deadzone || gp.buttons[7]?.pressed || gp.buttons[12]?.pressed) {
          thrustActive = true;
        } else if (!keys['ArrowUp'] && !keys['KeyW']) {
          thrustActive = thrustActive && (document.getElementById('thrustBtn').matches(':active'));
        }
        
        // Fire: A button, X button, RB, or LT
        const fireButton = gp.buttons[0]?.pressed || gp.buttons[2]?.pressed || 
                          gp.buttons[5]?.pressed || gp.buttons[6]?.pressed;
        
        if (fireButton && !gamepadFirePressed) {
          ship.shoot();
        }
        gamepadFirePressed = fireButton;
      }
      
      // Start button to start/restart
      if (gp.buttons[9]?.pressed) {
        if (!gameRunning && !document.getElementById('startScreen').classList.contains('hidden')) {
          startGame();
        } else if (gameOver) {
          startGame();
        }
      }
    }

    window.addEventListener('gamepadconnected', (e) => {
      console.log('Gamepad connected:', e.gamepad.id);
      document.getElementById('gamepadIndicator').classList.add('active');
      setTimeout(() => {
        if (gamepadIndex === null) {
          document.getElementById('gamepadIndicator').classList.remove('active');
        }
      }, 3000);
    });

    window.addEventListener('gamepaddisconnected', () => {
      gamepadIndex = null;
      document.getElementById('gamepadIndicator').classList.remove('active');
    });

    // Touch controls - Joystick
    const joystickZone = document.getElementById('joystickZone');
    const joystickBase = document.getElementById('joystickBase');
    const joystickStick = document.getElementById('joystickStick');

    joystickZone.addEventListener('touchstart', (e) => {
      if (!gameRunning || gameOver) return;
      
      const touch = e.touches[0];
      joystickTouchId = touch.identifier;
      joystickActive = true;
      joystickStart.x = touch.clientX;
      joystickStart.y = touch.clientY;
      joystickCurrent.x = touch.clientX;
      joystickCurrent.y = touch.clientY;
      
      joystickBase.style.left = touch.clientX + 'px';
      joystickBase.style.top = touch.clientY + 'px';
      joystickBase.style.display = 'block';
      
      joystickStick.style.left = touch.clientX + 'px';
      joystickStick.style.top = touch.clientY + 'px';
      
      e.preventDefault();
    });

    joystickZone.addEventListener('touchmove', (e) => {
      if (!joystickActive) return;
      
      for (const touch of e.touches) {
        if (touch.identifier === joystickTouchId) {
          joystickCurrent.x = touch.clientX;
          joystickCurrent.y = touch.clientY;
          
          // Limit joystick movement
          const dx = joystickCurrent.x - joystickStart.x;
          const dy = joystickCurrent.y - joystickStart.y;
          const dist = Math.hypot(dx, dy);
          const maxDist = 50;
          
          let stickX = joystickCurrent.x;
          let stickY = joystickCurrent.y;
          
          if (dist > maxDist) {
            stickX = joystickStart.x + (dx / dist) * maxDist;
            stickY = joystickStart.y + (dy / dist) * maxDist;
          }
          
          joystickStick.style.left = stickX + 'px';
          joystickStick.style.top = stickY + 'px';
          break;
        }
      }
      e.preventDefault();
    });

    joystickZone.addEventListener('touchend', (e) => {
      for (const touch of e.changedTouches) {
        if (touch.identifier === joystickTouchId) {
          joystickActive = false;
          joystickTouchId = null;
          joystickBase.style.display = 'none';
          break;
        }
      }
    });

    joystickZone.addEventListener('touchcancel', () => {
      joystickActive = false;
      joystickTouchId = null;
      joystickBase.style.display = 'none';
    });

    // Touch controls - Fire button
    const fireBtn = document.getElementById('fireBtn');
    
    fireBtn.addEventListener('touchstart', (e) => {
      if (!gameRunning || gameOver) return;
      ship.shoot();
      firePressed = true;
      e.preventDefault();
    });

    fireBtn.addEventListener('touchend', () => {
      firePressed = false;
    });

    // Touch controls - Thrust button
    const thrustBtn = document.getElementById('thrustBtn');
    
    thrustBtn.addEventListener('touchstart', (e) => {
      if (!gameRunning || gameOver) return;
      thrustActive = true;
      e.preventDefault();
    });

    thrustBtn.addEventListener('touchend', () => {
      thrustActive = false;
    });

    thrustBtn.addEventListener('touchcancel', () => {
      thrustActive = false;
    });

    // Rapid fire support for touch
    function handleTouchFire() {
      if (firePressed && gameRunning && !gameOver) {
        const now = Date.now();
        if (now - lastFireTime > 200) {
          ship.shoot();
          lastFireTime = now;
        }
      }
    }

    // Game loop
    function gameLoop() {
      if (!gameRunning) return;

      // Handle gamepad
      handleGamepad();
      
      // Handle touch rapid fire
      handleTouchFire();

      // Clear
      ctx.fillStyle = '#0a0a0a';
      ctx.fillRect(0, 0, W, H);

      // Draw stars
      ctx.fillStyle = '#333';
      for (let i = 0; i < 100; i++) {
        const sx = (i * 137.5) % W;
        const sy = (i * 97.3) % H;
        ctx.fillRect(sx, sy, 1, 1);
      }

      // Update & draw
      ship.update();
      ship.draw();

      bullets = bullets.filter(b => b.life > 0);
      bullets.forEach(b => { b.update(); b.draw(); });

      asteroids.forEach(a => { a.update(); a.draw(); });

      particles = particles.filter(p => p.life > 0);
      particles.forEach(p => { p.update(); p.draw(); });

      // Collisions
      for (let i = bullets.length - 1; i >= 0; i--) {
        for (let j = asteroids.length - 1; j >= 0; j--) {
          if (circleCollision(bullets[i], asteroids[j])) {
            const newAsteroids = asteroids[j].break();
            asteroids.splice(j, 1);
            bullets.splice(i, 1);
            asteroids.push(...newAsteroids);
            updateUI();
            break;
          }
        }
      }

      if (ship.invincible <= 0) {
        for (const a of asteroids) {
          if (circleCollision(ship, a)) {
            shipHit();
            break;
          }
        }
      }

      if (asteroids.length === 0) {
        spawnAsteroids(5 + Math.floor(score / 500));
      }

      requestAnimationFrame(gameLoop);
    }

    // Start game
    function startGame() {
      resizeCanvas();
      
      ship = new Ship();
      bullets = [];
      asteroids = [];
      particles = [];
      score = 0;
      lives = 3;
      gameRunning = true;
      gameOver = false;
      thrustActive = false;
      firePressed = false;

      updateUI();
      spawnAsteroids(4);

      document.getElementById('startScreen').classList.add('hidden');
      document.getElementById('gameOverScreen').classList.add('hidden');

      gameLoop();
    }

    // End game
    function endGame() {
      gameRunning = false;
      gameOver = true;
      document.getElementById('finalScore').textContent = `SCORE: ${score}`;
      document.getElementById('gameOverScreen').classList.remove('hidden');
    }

    // Keyboard input
    document.addEventListener('keydown', e => {
      keys[e.code] = true;
      if (e.code === 'Space' && gameRunning && !gameOver) {
        ship.shoot();
        e.preventDefault();
      }
    });

    document.addEventListener('keyup', e => {
      keys[e.code] = false;
    });

    // Button handlers
    document.getElementById('startBtn').addEventListener('click', startGame);
    document.getElementById('restartBtn').addEventListener('click', startGame);

    // Prevent zoom on double-tap
    document.addEventListener('dblclick', (e) => e.preventDefault());
    
    // Initial resize
    resizeCanvas();
  </script>
</body>
</html>
