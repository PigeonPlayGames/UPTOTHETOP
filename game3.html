<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Asteroid Blaster</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      touch-action: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background: #0a0a0a;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Courier New', monospace;
    }

    .game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      max-width: 100%;
      max-height: 100%;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      border: none;
    }

    .ui {
      position: absolute;
      top: 10px;
      left: 15px;
      right: 15px;
      display: flex;
      justify-content: space-between;
      color: #0ff;
      font-size: clamp(14px, 3vw, 18px);
      text-shadow: 0 0 10px #0ff;
      pointer-events: none;
      z-index: 10;
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #0ff;
      text-align: center;
      padding: 20px;
      z-index: 20;
    }

    .overlay.hidden {
      display: none;
    }

    .overlay h1 {
      font-size: clamp(28px, 8vw, 48px);
      margin-bottom: 10px;
      text-shadow: 0 0 20px #0ff, 0 0 40px #0ff;
      letter-spacing: 2px;
    }

    .overlay h2 {
      font-size: clamp(24px, 6vw, 32px);
      margin-bottom: 20px;
      color: #f0f;
      text-shadow: 0 0 15px #f0f;
    }

    .overlay p {
      font-size: clamp(12px, 2.5vw, 16px);
      margin: 6px 0;
      opacity: 0.8;
    }

    .overlay .score-display {
      font-size: clamp(18px, 5vw, 24px);
      margin: 20px 0;
      color: #ff0;
      text-shadow: 0 0 10px #ff0;
    }

    .start-btn {
      margin-top: 25px;
      padding: 12px 40px;
      font-size: clamp(16px, 4vw, 20px);
      font-family: 'Courier New', monospace;
      background: transparent;
      color: #0ff;
      border: 2px solid #0ff;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: all 0.3s;
    }

    .start-btn:hover, .start-btn:active {
      background: #0ff;
      color: #000;
      box-shadow: 0 0 30px #0ff;
    }

    .controls-info {
      margin-top: 30px;
      padding: 15px;
      border: 1px solid rgba(0, 255, 255, 0.3);
      max-width: 90%;
    }

    .controls-info h3 {
      margin-bottom: 12px;
      font-size: clamp(12px, 2.5vw, 14px);
      letter-spacing: 2px;
    }

    .desktop-controls, .mobile-controls {
      display: none;
    }

    .touch-controls {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      top: 0;
      pointer-events: none;
      z-index: 5;
      display: none;
    }

    .touch-controls.active {
      display: block;
    }

    .joystick-zone {
      position: absolute;
      left: 0;
      top: 0;
      width: 50%;
      height: 100%;
      pointer-events: auto;
    }

    .joystick-base {
      position: absolute;
      width: 120px;
      height: 120px;
      border: 3px solid rgba(0, 255, 255, 0.4);
      border-radius: 50%;
      background: rgba(0, 255, 255, 0.1);
      display: none;
      transform: translate(-50%, -50%);
    }

    .joystick-stick {
      position: absolute;
      width: 50px;
      height: 50px;
      background: rgba(0, 255, 255, 0.6);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 20px #0ff;
    }

    .fire-zone {
      position: absolute;
      right: 0;
      top: 0;
      width: 50%;
      height: 100%;
      pointer-events: auto;
    }

    .fire-btn {
      position: absolute;
      right: 30px;
      bottom: 80px;
      width: 80px;
      height: 80px;
      border: 3px solid rgba(255, 255, 0, 0.6);
      border-radius: 50%;
      background: rgba(255, 255, 0, 0.2);
      display: flex;
      justify-content: center;
      align-items: center;
      color: #ff0;
      font-size: 12px;
      font-weight: bold;
      text-shadow: 0 0 10px #ff0;
      pointer-events: auto;
    }

    .fire-btn:active {
      background: rgba(255, 255, 0, 0.5);
      box-shadow: 0 0 30px #ff0;
    }

    .thrust-btn {
      position: absolute;
      right: 30px;
      bottom: 180px;
      width: 70px;
      height: 70px;
      border: 3px solid rgba(255, 136, 0, 0.6);
      border-radius: 50%;
      background: rgba(255, 136, 0, 0.2);
      display: flex;
      justify-content: center;
      align-items: center;
      color: #f80;
      font-size: 20px;
      text-shadow: 0 0 10px #f80;
      pointer-events: auto;
    }

    .thrust-btn:active {
      background: rgba(255, 136, 0, 0.5);
      box-shadow: 0 0 30px #f80;
    }

    @media (hover: hover) and (pointer: fine) {
      .desktop-controls { display: block; }
    }

    @media (hover: none) and (pointer: coarse) {
      .mobile-controls { display: block; }
    }

    .gamepad-indicator {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      color: #0f0;
      font-size: 12px;
      text-shadow: 0 0 10px #0f0;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 10;
    }

    .gamepad-indicator.active {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="game-container">
    <canvas id="game"></canvas>
    
    <div class="ui">
      <div id="score">SCORE: 0</div>
      <div id="lives">LIVES: ♦♦♦</div>
    </div>

    <div class="gamepad-indicator" id="gamepadIndicator">🎮 GAMEPAD CONNECTED</div>

    <div class="touch-controls" id="touchControls">
      <div class="joystick-zone" id="joystickZone">
        <div class="joystick-base" id="joystickBase">
          <div class="joystick-stick" id="joystickStick"></div>
        </div>
      </div>
      <div class="fire-zone" id="fireZone">
        <div class="thrust-btn" id="thrustBtn">▲</div>
        <div class="fire-btn" id="fireBtn">FIRE</div>
      </div>
    </div>

    <div class="overlay" id="startScreen">
      <h1>ASTEROID BLASTER</h1>
      <div class="controls-info">
        <h3>— CONTROLS —</h3>
        <div class="desktop-controls">
          <p>↑ or W — Thrust</p>
          <p>← → or A D — Rotate</p>
          <p>SPACE — Fire</p>
        </div>
        <div class="mobile-controls">
          <p>Left side — Virtual joystick to rotate</p>
          <p>▲ Button — Thrust forward</p>
          <p>FIRE Button — Shoot</p>
        </div>
        <p style="margin-top: 10px; color: #0f0;">🎮 Gamepad supported!</p>
      </div>
      <button class="start-btn" id="startBtn">START GAME</button>
    </div>

    <div class="overlay hidden" id="gameOverScreen">
      <h2>GAME OVER</h2>
      <div class="score-display" id="finalScore">SCORE: 0</div>
      <button class="start-btn" id="restartBtn">PLAY AGAIN</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d', { alpha: false });
    
    // Responsive canvas sizing
    let W, H, scale;
    
    // Pre-generate stars once
    let stars = [];
    
    function generateStars() {
      stars = [];
      for (let i = 0; i < 100; i++) {
        stars.push({
          x: Math.random() * W,
          y: Math.random() * H
        });
      }
    }
    
    function resizeCanvas() {
      const container = canvas.parentElement;
      W = container.clientWidth;
      H = container.clientHeight;
      
      const dpr = Math.min(window.devicePixelRatio || 1, 2); // Cap DPR for performance
      canvas.width = W * dpr;
      canvas.height = H * dpr;
      ctx.scale(dpr, dpr);
      
      scale = Math.min(W / 800, H / 600);
      generateStars();
    }
    
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
    
    if (isTouchDevice) {
      document.getElementById('touchControls').classList.add('active');
    }

    // Game state
    let ship, bullets, asteroids, particles;
    let score, lives, gameRunning, gameOver;
    let keys = {};

    // Touch/Joystick state
    let joystickActive = false;
    let joystickStart = { x: 0, y: 0 };
    let joystickCurrent = { x: 0, y: 0 };
    let joystickTouchId = null;
    let thrustActive = false;
    let firePressed = false;
    let lastFireTime = 0;

    // Gamepad state
    let gamepadIndex = null;
    let gamepadFirePressed = false;

    // ===== OBJECT POOLS =====
    const MAX_BULLETS = 50;
    const MAX_PARTICLES = 200;
    
    class ObjectPool {
      constructor(createFn, resetFn, initialSize = 50) {
        this.createFn = createFn;
        this.resetFn = resetFn;
        this.pool = [];
        this.active = [];
        
        for (let i = 0; i < initialSize; i++) {
          this.pool.push(createFn());
        }
      }
      
      get(...args) {
        let obj = this.pool.pop();
        if (!obj) obj = this.createFn();
        this.resetFn(obj, ...args);
        this.active.push(obj);
        return obj;
      }
      
      release(obj) {
        const idx = this.active.indexOf(obj);
        if (idx !== -1) {
          this.active.splice(idx, 1);
          this.pool.push(obj);
        }
      }
      
      releaseAll() {
        while (this.active.length) {
          this.pool.push(this.active.pop());
        }
      }
    }

    // ===== SHIP =====
    class Ship {
      constructor() {
        this.reset();
      }
      
      reset() {
        this.x = W / 2;
        this.y = H / 2;
        this.angle = -Math.PI / 2;
        this.vx = 0;
        this.vy = 0;
        this.radius = 15 * scale;
        this.thrust = 0.15 * scale;
        this.friction = 0.99;
        this.rotSpeed = 0.07;
        this.invincible = 0;
        this.visible = true;
        
        // Pre-calculate ship vertices
        this.updateVertices();
      }
      
      updateVertices() {
        const s = scale;
        this.vertices = [
          { x: 20 * s, y: 0 },
          { x: -15 * s, y: -12 * s },
          { x: -10 * s, y: 0 },
          { x: -15 * s, y: 12 * s }
        ];
      }

      update() {
        if (keys['ArrowLeft'] || keys['KeyA']) this.angle -= this.rotSpeed;
        if (keys['ArrowRight'] || keys['KeyD']) this.angle += this.rotSpeed;
        
        if (joystickActive) {
          const dx = joystickCurrent.x - joystickStart.x;
          const dy = joystickCurrent.y - joystickStart.y;
          const dist = Math.sqrt(dx * dx + dy * dy); // Faster than hypot
          
          if (dist > 10) {
            const targetAngle = Math.atan2(dy, dx);
            let angleDiff = targetAngle - this.angle;
            
            if (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
            else if (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
            
            const rotAmount = Math.abs(angleDiff) < this.rotSpeed * 1.5 
              ? Math.abs(angleDiff) 
              : this.rotSpeed * 1.5;
            this.angle += (angleDiff > 0 ? 1 : -1) * rotAmount;
          }
        }
        
        const isThrusting = keys['ArrowUp'] || keys['KeyW'] || thrustActive;
        
        if (isThrusting) {
          const cos = Math.cos(this.angle);
          const sin = Math.sin(this.angle);
          this.vx += cos * this.thrust;
          this.vy += sin * this.thrust;
          
          // Throttle particle creation
          if (particlePool.active.length < MAX_PARTICLES && Math.random() > 0.6) {
            particlePool.get(
              this.x - cos * 20 * scale,
              this.y - sin * 20 * scale,
              this.vx * -0.5 + (Math.random() - 0.5) * scale,
              this.vy * -0.5 + (Math.random() - 0.5) * scale,
              255, 136, 0, 15
            );
          }
        }

        this.vx *= this.friction;
        this.vy *= this.friction;
        this.x += this.vx;
        this.y += this.vy;

        if (this.x < 0) this.x = W;
        else if (this.x > W) this.x = 0;
        if (this.y < 0) this.y = H;
        else if (this.y > H) this.y = 0;

        if (this.invincible > 0) {
          this.invincible--;
          this.visible = (this.invincible / 5 | 0) % 2 === 0;
        } else {
          this.visible = true;
        }
      }

      draw() {
        if (!this.visible) return;
        
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);
        
        ctx.strokeStyle = '#0ff';
        ctx.lineWidth = 2;
        
        ctx.beginPath();
        ctx.moveTo(this.vertices[0].x, this.vertices[0].y);
        ctx.lineTo(this.vertices[1].x, this.vertices[1].y);
        ctx.lineTo(this.vertices[2].x, this.vertices[2].y);
        ctx.lineTo(this.vertices[3].x, this.vertices[3].y);
        ctx.closePath();
        ctx.stroke();
        
        ctx.restore();
      }

      shoot() {
        if (bulletPool.active.length >= MAX_BULLETS) return;
        
        const s = scale;
        const cos = Math.cos(this.angle);
        const sin = Math.sin(this.angle);
        
        bulletPool.get(
          this.x + cos * 20 * s,
          this.y + sin * 20 * s,
          cos * 8 * s + this.vx,
          sin * 8 * s + this.vy
        );
      }
    }

    // ===== BULLET =====
    function createBullet() {
      return { x: 0, y: 0, vx: 0, vy: 0, radius: 3 * scale, life: 0, active: false };
    }
    
    function resetBullet(b, x, y, vx, vy) {
      b.x = x;
      b.y = y;
      b.vx = vx;
      b.vy = vy;
      b.radius = 3 * scale;
      b.life = 60;
      b.active = true;
    }
    
    let bulletPool;

    function updateBullet(b) {
      b.x += b.vx;
      b.y += b.vy;
      b.life--;

      if (b.x < 0) b.x = W;
      else if (b.x > W) b.x = 0;
      if (b.y < 0) b.y = H;
      else if (b.y > H) b.y = 0;
      
      return b.life > 0;
    }

    function drawBullet(b) {
      ctx.fillStyle = '#ff0';
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
      ctx.fill();
    }

    // ===== ASTEROID =====
    class Asteroid {
      constructor(x, y, size) {
        this.init(x, y, size);
      }
      
      init(x, y, size) {
        this.x = x;
        this.y = y;
        this.size = size;
        this.radius = (size * 15 + 10) * scale;
        
        const speed = ((4 - size) * 0.8 + Math.random()) * scale;
        const angle = Math.random() * Math.PI * 2;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.rotation = 0;
        this.rotSpeed = (Math.random() - 0.5) * 0.04;
        
        // Pre-generate vertices
        this.vertices = [];
        const numVerts = 8 + (Math.random() * 5 | 0);
        for (let i = 0; i < numVerts; i++) {
          const a = (i / numVerts) * Math.PI * 2;
          const r = this.radius * (0.7 + Math.random() * 0.3);
          this.vertices.push(Math.cos(a) * r, Math.sin(a) * r);
        }
        
        return this;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.rotation += this.rotSpeed;

        const r = this.radius;
        if (this.x < -r) this.x = W + r;
        else if (this.x > W + r) this.x = -r;
        if (this.y < -r) this.y = H + r;
        else if (this.y > H + r) this.y = -r;
      }

      draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);
        
        ctx.strokeStyle = '#888';
        ctx.lineWidth = 2;
        
        ctx.beginPath();
        ctx.moveTo(this.vertices[0], this.vertices[1]);
        for (let i = 2; i < this.vertices.length; i += 2) {
          ctx.lineTo(this.vertices[i], this.vertices[i + 1]);
        }
        ctx.closePath();
        ctx.stroke();
        
        ctx.restore();
      }

      break() {
        const points = [20, 50, 100][3 - this.size];
        score += points;
        
        // Reduced particle count
        const particleCount = Math.min(this.size * 4, MAX_PARTICLES - particlePool.active.length);
        for (let i = 0; i < particleCount; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = (Math.random() * 3 + 1) * scale;
          particlePool.get(
            this.x, this.y,
            Math.cos(angle) * speed + this.vx,
            Math.sin(angle) * speed + this.vy,
            255, 255, 255, 20
          );
        }

        if (this.size > 1) {
          const newSize = this.size - 1;
          const numNew = 2 + (Math.random() * 2 | 0);
          const spawned = [];
          for (let i = 0; i < numNew; i++) {
            spawned.push(new Asteroid(this.x, this.y, newSize));
          }
          return spawned;
        }
        return [];
      }
    }

    // ===== PARTICLE =====
    function createParticle() {
      return { x: 0, y: 0, vx: 0, vy: 0, r: 0, g: 0, b: 0, life: 0, maxLife: 0, active: false };
    }
    
    function resetParticle(p, x, y, vx, vy, r, g, b, life) {
      p.x = x;
      p.y = y;
      p.vx = vx;
      p.vy = vy;
      p.r = r;
      p.g = g;
      p.b = b;
      p.life = life;
      p.maxLife = life;
      p.active = true;
    }
    
    let particlePool;

    function updateParticle(p) {
      p.x += p.vx;
      p.y += p.vy;
      p.vx *= 0.98;
      p.vy *= 0.98;
      p.life--;
      return p.life > 0;
    }

    function drawParticle(p) {
      const alpha = p.life / p.maxLife;
      ctx.fillStyle = `rgba(${p.r},${p.g},${p.b},${alpha})`;
      ctx.fillRect(p.x - scale, p.y - scale, scale * 2, scale * 2); // Faster than arc
    }

    // Spawn asteroids
    function spawnAsteroids(count) {
      for (let i = 0; i < count; i++) {
        let x, y, attempts = 0;
        const safeDistSq = (150 * scale) ** 2;
        
        do {
          x = Math.random() * W;
          y = Math.random() * H;
          attempts++;
        } while (attempts < 20 && (x - ship.x) ** 2 + (y - ship.y) ** 2 < safeDistSq);
        
        asteroids.push(new Asteroid(x, y, 3));
      }
    }

    // Collision detection - squared distance (no sqrt)
    function circleCollisionSq(a, b) {
      const dx = a.x - b.x;
      const dy = a.y - b.y;
      const radSum = a.radius + b.radius;
      return dx * dx + dy * dy < radSum * radSum;
    }

    // Ship hit
    function shipHit() {
      lives--;
      updateUI();
      
      const particleCount = Math.min(20, MAX_PARTICLES - particlePool.active.length);
      for (let i = 0; i < particleCount; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = (Math.random() * 4 + 2) * scale;
        particlePool.get(
          ship.x, ship.y,
          Math.cos(angle) * speed,
          Math.sin(angle) * speed,
          0, 255, 255, 40
        );
      }

      if (lives <= 0) {
        endGame();
      } else {
        ship.x = W / 2;
        ship.y = H / 2;
        ship.vx = 0;
        ship.vy = 0;
        ship.invincible = 120;
      }
    }

    // Update UI
    function updateUI() {
      document.getElementById('score').textContent = `SCORE: ${score}`;
      document.getElementById('lives').textContent = `LIVES: ${'♦'.repeat(Math.max(0, lives))}`;
    }

    // Gamepad handling
    function handleGamepad() {
      const gamepads = navigator.getGamepads();
      let gp = null;
      
      for (const pad of gamepads) {
        if (pad && pad.connected) {
          gp = pad;
          gamepadIndex = pad.index;
          break;
        }
      }
      
      if (!gp) {
        gamepadIndex = null;
        document.getElementById('gamepadIndicator').classList.remove('active');
        return;
      }
      
      document.getElementById('gamepadIndicator').classList.add('active');
      
      const deadzone = 0.2;
      const lx = Math.abs(gp.axes[0]) > deadzone ? gp.axes[0] : 0;
      const ly = Math.abs(gp.axes[1]) > deadzone ? gp.axes[1] : 0;
      
      if (ship && gameRunning) {
        if (lx !== 0) {
          ship.angle += lx * ship.rotSpeed * 1.2;
        }
        
        if (gp.buttons[14]?.pressed) ship.angle -= ship.rotSpeed;
        if (gp.buttons[15]?.pressed) ship.angle += ship.rotSpeed;
        
        if (ly < -deadzone || gp.buttons[7]?.pressed || gp.buttons[12]?.pressed) {
          thrustActive = true;
        } else if (!keys['ArrowUp'] && !keys['KeyW']) {
          thrustActive = thrustActive && (document.getElementById('thrustBtn').matches(':active'));
        }
        
        const fireButton = gp.buttons[0]?.pressed || gp.buttons[2]?.pressed || 
                          gp.buttons[5]?.pressed || gp.buttons[6]?.pressed;
        
        if (fireButton && !gamepadFirePressed) {
          ship.shoot();
        }
        gamepadFirePressed = fireButton;
      }
      
      if (gp.buttons[9]?.pressed) {
        if (!gameRunning && !document.getElementById('startScreen').classList.contains('hidden')) {
          startGame();
        } else if (gameOver) {
          startGame();
        }
      }
    }

    window.addEventListener('gamepadconnected', (e) => {
      document.getElementById('gamepadIndicator').classList.add('active');
      setTimeout(() => {
        if (gamepadIndex === null) {
          document.getElementById('gamepadIndicator').classList.remove('active');
        }
      }, 3000);
    });

    window.addEventListener('gamepaddisconnected', () => {
      gamepadIndex = null;
      document.getElementById('gamepadIndicator').classList.remove('active');
    });

    // Touch controls
    const joystickZone = document.getElementById('joystickZone');
    const joystickBase = document.getElementById('joystickBase');
    const joystickStick = document.getElementById('joystickStick');

    joystickZone.addEventListener('touchstart', (e) => {
      if (!gameRunning || gameOver) return;
      
      const touch = e.touches[0];
      joystickTouchId = touch.identifier;
      joystickActive = true;
      joystickStart.x = touch.clientX;
      joystickStart.y = touch.clientY;
      joystickCurrent.x = touch.clientX;
      joystickCurrent.y = touch.clientY;
      
      joystickBase.style.left = touch.clientX + 'px';
      joystickBase.style.top = touch.clientY + 'px';
      joystickBase.style.display = 'block';
      
      joystickStick.style.left = touch.clientX + 'px';
      joystickStick.style.top = touch.clientY + 'px';
      
      e.preventDefault();
    }, { passive: false });

    joystickZone.addEventListener('touchmove', (e) => {
      if (!joystickActive) return;
      
      for (const touch of e.touches) {
        if (touch.identifier === joystickTouchId) {
          joystickCurrent.x = touch.clientX;
          joystickCurrent.y = touch.clientY;
          
          const dx = joystickCurrent.x - joystickStart.x;
          const dy = joystickCurrent.y - joystickStart.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          const maxDist = 50;
          
          let stickX = joystickCurrent.x;
          let stickY = joystickCurrent.y;
          
          if (dist > maxDist) {
            const ratio = maxDist / dist;
            stickX = joystickStart.x + dx * ratio;
            stickY = joystickStart.y + dy * ratio;
          }
          
          joystickStick.style.left = stickX + 'px';
          joystickStick.style.top = stickY + 'px';
          break;
        }
      }
      e.preventDefault();
    }, { passive: false });

    joystickZone.addEventListener('touchend', (e) => {
      for (const touch of e.changedTouches) {
        if (touch.identifier === joystickTouchId) {
          joystickActive = false;
          joystickTouchId = null;
          joystickBase.style.display = 'none';
          break;
        }
      }
    });

    joystickZone.addEventListener('touchcancel', () => {
      joystickActive = false;
      joystickTouchId = null;
      joystickBase.style.display = 'none';
    });

    const fireBtn = document.getElementById('fireBtn');
    
    fireBtn.addEventListener('touchstart', (e) => {
      if (!gameRunning || gameOver) return;
      ship.shoot();
      firePressed = true;
      e.preventDefault();
    }, { passive: false });

    fireBtn.addEventListener('touchend', () => {
      firePressed = false;
    });

    const thrustBtn = document.getElementById('thrustBtn');
    
    thrustBtn.addEventListener('touchstart', (e) => {
      if (!gameRunning || gameOver) return;
      thrustActive = true;
      e.preventDefault();
    }, { passive: false });

    thrustBtn.addEventListener('touchend', () => {
      thrustActive = false;
    });

    thrustBtn.addEventListener('touchcancel', () => {
      thrustActive = false;
    });

    function handleTouchFire() {
      if (firePressed && gameRunning && !gameOver) {
        const now = Date.now();
        if (now - lastFireTime > 200) {
          ship.shoot();
          lastFireTime = now;
        }
      }
    }

    // ===== OPTIMIZED GAME LOOP =====
    function gameLoop() {
      if (!gameRunning) return;

      handleGamepad();
      handleTouchFire();

      // Clear with solid color (faster than fillRect in some browsers)
      ctx.fillStyle = '#0a0a0a';
      ctx.fillRect(0, 0, W, H);

      // Draw pre-generated stars
      ctx.fillStyle = '#333';
      for (let i = 0; i < stars.length; i++) {
        ctx.fillRect(stars[i].x, stars[i].y, 1, 1);
      }

      ship.update();
      ship.draw();

      // Update bullets with pool
      const activeBullets = bulletPool.active;
      for (let i = activeBullets.length - 1; i >= 0; i--) {
        const b = activeBullets[i];
        if (!updateBullet(b)) {
          bulletPool.release(b);
        } else {
          drawBullet(b);
        }
      }

      // Update asteroids
      for (let i = 0; i < asteroids.length; i++) {
        asteroids[i].update();
        asteroids[i].draw();
      }

      // Update particles with pool
      const activeParticles = particlePool.active;
      for (let i = activeParticles.length - 1; i >= 0; i--) {
        const p = activeParticles[i];
        if (!updateParticle(p)) {
          particlePool.release(p);
        } else {
          drawParticle(p);
        }
      }

      // Collision detection
      const bullets = bulletPool.active;
      outer: for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        for (let j = asteroids.length - 1; j >= 0; j--) {
          if (circleCollisionSq(b, asteroids[j])) {
            const newAsteroids = asteroids[j].break();
            asteroids.splice(j, 1);
            bulletPool.release(b);
            asteroids.push(...newAsteroids);
            updateUI();
            continue outer;
          }
        }
      }

      if (ship.invincible <= 0) {
        for (let i = 0; i < asteroids.length; i++) {
          if (circleCollisionSq(ship, asteroids[i])) {
            shipHit();
            break;
          }
        }
      }

      if (asteroids.length === 0) {
        spawnAsteroids(5 + (score / 500 | 0));
      }

      requestAnimationFrame(gameLoop);
    }

    // Start game
    function startGame() {
      resizeCanvas();
      
      // Initialize pools
      bulletPool = new ObjectPool(createBullet, resetBullet, MAX_BULLETS);
      particlePool = new ObjectPool(createParticle, resetParticle, MAX_PARTICLES);
      
      ship = new Ship();
      asteroids = [];
      score = 0;
      lives = 3;
      gameRunning = true;
      gameOver = false;
      thrustActive = false;
      firePressed = false;

      updateUI();
      spawnAsteroids(4);

      document.getElementById('startScreen').classList.add('hidden');
      document.getElementById('gameOverScreen').classList.add('hidden');

      gameLoop();
    }

    // End game
    function endGame() {
      gameRunning = false;
      gameOver = true;
      document.getElementById('finalScore').textContent = `SCORE: ${score}`;
      document.getElementById('gameOverScreen').classList.remove('hidden');
    }

    // Keyboard input
    document.addEventListener('keydown', e => {
      keys[e.code] = true;
      if (e.code === 'Space' && gameRunning && !gameOver) {
        ship.shoot();
        e.preventDefault();
      }
    });

    document.addEventListener('keyup', e => {
      keys[e.code] = false;
    });

    document.getElementById('startBtn').addEventListener('click', startGame);
    document.getElementById('restartBtn').addEventListener('click', startGame);

    document.addEventListener('dblclick', (e) => e.preventDefault());
    
    resizeCanvas();
  </script>
</body>
</html>
